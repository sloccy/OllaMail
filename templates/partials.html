{{define "action_checkboxes"}}
<div class="d-flex flex-wrap gap-2 mt-1">
  <div class="d-flex align-items-center gap-2 bg-base-300 border rounded-2 px-3 py-2"><input type="checkbox" class="form-check-input mt-0" name="action_archive" value="1" id="{{.Prefix}}-archive"{{if .ActionArchive}} checked{{end}}><label class="mb-0" for="{{.Prefix}}-archive">Archive</label></div>
  <div class="d-flex align-items-center gap-2 bg-base-300 border rounded-2 px-3 py-2"><input type="checkbox" class="form-check-input mt-0" name="action_spam" value="1" id="{{.Prefix}}-spam"{{if .ActionSpam}} checked{{end}}><label class="mb-0" for="{{.Prefix}}-spam">Send to Spam</label></div>
  <div class="d-flex align-items-center gap-2 bg-base-300 border rounded-2 px-3 py-2"><input type="checkbox" class="form-check-input mt-0" name="action_trash" value="1" id="{{.Prefix}}-trash"{{if .ActionTrash}} checked{{end}}><label class="mb-0" for="{{.Prefix}}-trash">Trash</label></div>
  <div class="d-flex align-items-center gap-2 bg-base-300 border rounded-2 px-3 py-2"><input type="checkbox" class="form-check-input mt-0" name="action_mark_read" value="1" id="{{.Prefix}}-read"{{if .ActionMarkRead}} checked{{end}}><label class="mb-0" for="{{.Prefix}}-read">Mark as Read</label></div>
</div>
{{end}}
