line-length = 120
target-version = "py314"

[lint]
select = [
    "A",     # flake8-builtins
    "B",     # flake8-bugbear
    "C4",    # flake8-comprehensions
    "DTZ",   # flake8-datetimez
    "E",     # pycodestyle errors
    "ERA",   # eradicate (commented-out code)
    "F",     # pyflakes
    "FURB",  # refurb (modern idioms)
    "G",     # flake8-logging-format
    "I",     # isort
    "ISC",   # implicit-str-concat
    "LOG",   # flake8-logging
    "N",     # pep8-naming
    "PERF",  # perflint
    "PIE",   # flake8-pie
    "PL",    # pylint
    "RET",   # flake8-return
    "RUF",   # ruff-specific
    "S",     # flake8-bandit (security)
    "SIM",   # flake8-simplify
    "T20",   # flake8-print
    "UP",    # pyupgrade
    "W",     # pycodestyle warnings
]
ignore = [
    "E501",    # line too long (handled by formatter)
    "ISC001",  # single-line implicit string concat (conflicts with formatter)
    "PLR0913", # too-many-arguments (ORM functions legitimately need many params)
    "PLR2004", # magic-value-comparison (time formatting constants, API limits)
    "PLW0603", # global-statement (legitimate for scheduler state in poller.py)
]

[lint.per-file-ignores]
"app/server.py" = ["N806", "PLR0912", "PLR0915"]
"app/email_processor.py" = ["PLR0912", "PLR0915"]

[format]
quote-style = "double"
indent-style = "space"
