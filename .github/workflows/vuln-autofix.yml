name: Go vuln auto-fix

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    uses: sloccy/shared-ci/.github/workflows/vuln-autofix.yml@main
    secrets:
      pr_token: ${{ secrets.WORKFLOW_TOKEN }}
