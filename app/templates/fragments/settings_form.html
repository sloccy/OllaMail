<form id="settings-form" hx-patch="/fragments/settings" hx-target="#settings-form" hx-swap="outerHTML">
  <div class="card">
    <div class="card-body u-p-0">
      <div class="u-flex u-items-center u-justify-between u-py-3 u-px-4 border-b setting-row">
        <div><div class="font-medium">Poll interval</div><div class="text-sm u-text-muted u-mt-1">How often to scan for new emails (seconds). Minimum 30.</div></div>
        <div class="u-flex-shrink-0 u-ml-4"><input type="number" class="input input-sm" name="poll_interval" min="30" step="30" value="{{ poll_interval }}" style="width:100px;text-align:right;"></div>
      </div>
      <div class="u-flex u-items-center u-justify-between u-py-3 u-px-4 border-b setting-row">
        <div><div class="font-medium">Ollama model</div><div class="text-sm u-text-muted u-mt-1">Set via OLLAMA_MODEL in docker-compose.yml</div></div>
        <div class="u-flex-shrink-0 u-ml-4"><span class="badge badge-primary border u-border-primary-subtle font-mono">{{ ollama_model }}</span></div>
      </div>
      <div class="u-flex u-items-center u-justify-between u-py-3 u-px-4 setting-row">
        <div><div class="font-medium">Ollama host</div><div class="text-sm u-text-muted u-mt-1">Set via OLLAMA_HOST in docker-compose.yml</div></div>
        <div class="u-flex-shrink-0 u-ml-4"><span class="badge badge-primary border u-border-primary-subtle font-mono">{{ ollama_host }}</span></div>
      </div>
    </div>
  </div>
  <div class="u-mt-3">
    <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
  </div>
</form>
