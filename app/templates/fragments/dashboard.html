<div class="u-grid u-grid-auto u-gap-3 u-mb-4">
  <div><div class="card stat stat-blue"><div class="card-body u-p-3"><div class="uppercase text-sm u-text-muted u-mb-2" style="letter-spacing:0.09em;">Accounts</div><div class="font-mono u-text-2xl font-semibold accent">{{ accounts|length }}</div></div></div></div>
  <div><div class="card stat stat-green"><div class="card-body u-p-3"><div class="uppercase text-sm u-text-muted u-mb-2" style="letter-spacing:0.09em;">Active Prompts</div><div class="font-mono u-text-2xl font-semibold accent">{{ active_prompts }}</div></div></div></div>
  <div><div class="card stat stat-muted"><div class="card-body u-p-3"><div class="uppercase text-sm u-text-muted u-mb-2" style="letter-spacing:0.09em;">Poll Interval</div><div class="font-mono u-text-2xl font-semibold">{{ poll_interval }}</div></div></div></div>
  <div><div class="card stat stat-green"><div class="card-body u-p-3"><div class="uppercase text-sm u-text-muted u-mb-2" style="letter-spacing:0.09em;">Next Scan</div><div class="font-mono u-text-2xl font-semibold green">{{ next_scan }}</div></div></div></div>
</div>
<script>
  (function(){
    var dot = document.getElementById('pollerDot');
    var lbl = document.getElementById('pollerLabel');
    {% if poller_running %}
    dot.classList.add('active'); lbl.textContent = 'running';
    {% else %}
    dot.classList.remove('active'); lbl.textContent = 'stopped';
    {% endif %}
  })();
</script>
<h6 class="uppercase u-text-muted text-sm font-semibold border-b u-pb-2 u-mb-3">Recent Activity</h6>
{% include 'fragments/logs_list.html' %}
