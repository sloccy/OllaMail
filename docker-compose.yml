services:
  app:
    image: ghcr.io/sloccy/ollamail:latest
    container_name: ollamail-app
    ports:
      - "5001:5000"
    volumes:
      - /home/docker/docker/ollamail/data:/data
      - /home/docker/docker/ollamail/credentials:/credentials
    environment:
      - DATA_DIR=/data
      - CREDENTIALS_FILE=/credentials/credentials.json
      - BASE_URL=http://10.0.0.5:5001
      # Only process emails received within this many hours (default: 24)
      # Increase for a longer catch-up window, e.g. 168 = last 7 days
      - GMAIL_LOOKBACK_HOURS=24
      # How long to wait (seconds) for the model runner to respond (default: 600)
      - LLM_TIMEOUT=600
      # Max tokens the LLM can generate per response (default: 8192)
      #- LLM_NUM_PREDICT=8192
      # How many emails to fetch per inbox scan (default: 50)
      # Only unprocessed emails are classified, so higher values are safe
      - GMAIL_MAX_RESULTS=10
    models:
      llm:
        endpoint_var: LLM_BASE_URL
        model_var: LLM_MODEL
    restart: unless-stopped
    networks:
      - internal

models:
  llm:
    model: hf.co/unsloth/Qwen3.5-9B-GGUF:UD-Q5_K_XL
    context_size: 8192

networks:
  internal:
